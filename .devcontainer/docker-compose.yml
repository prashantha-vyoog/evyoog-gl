version: "3.9"

services:

  # ── Application container ─────────────────────────────────────────────────
  # Codespaces mounts the workspace into this container.
  # The Spring Boot app is run manually (mvn spring-boot:run) — not auto-started.
  app:
    image: mcr.microsoft.com/devcontainers/java:21-bullseye
    volumes:
      - ../..:/workspaces:cached
    command: sleep infinity
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/evyoog_gl
      SPRING_DATASOURCE_USERNAME: evyoog_app
      SPRING_DATASOURCE_PASSWORD: evyoog_dev_pass
      SPRING_PROFILES_ACTIVE: dev
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - evyoog-network

  # ── PostgreSQL 16 ─────────────────────────────────────────────────────────
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: evyoog_gl
      POSTGRES_USER: evyoog_app
      POSTGRES_PASSWORD: evyoog_dev_pass
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U evyoog_app -d evyoog_gl"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - evyoog-network

volumes:
  postgres-data:
    name: evyoog-postgres-data

networks:
  evyoog-network:
    name: evyoog-network
    driver: bridge
