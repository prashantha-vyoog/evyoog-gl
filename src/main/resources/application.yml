spring:
  application:
    name: evyoog-gl
  autoconfigure:
    # This app authenticates purely via JwtAuthenticationFilter (SecurityContextHolder is
    # set directly from the JWT, never through AuthenticationManager/UserDetailsService),
    # so the default in-memory user Boot generates here is unused — exclude it to silence
    # the "Using generated security password" boot-log noise. Boot 4 moved this class to
    # org.springframework.boot.security.autoconfigure (NOT the Boot 3
    # org.springframework.boot.autoconfigure.security.servlet path) — verified against
    # the actual spring-boot-security-4.0.7.jar contents before using it here.
    exclude: org.springframework.boot.security.autoconfigure.UserDetailsServiceAutoConfiguration
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/evyoog_gl}
    username: ${SPRING_DATASOURCE_USERNAME:evyoog_app}
    password: ${SPRING_DATASOURCE_PASSWORD:evyoog_dev_pass}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        default_schema: gl
        format_sql: true
  flyway:
    enabled: true
    schemas: gl,aie,auth
    locations: classpath:db/migration
    baseline-on-migrate: false
    validate-on-migrate: true

evyoog:
  jwt:
    secret: ${EVYOOG_JWT_SECRET:evyoog-jwt-secret-key-minimum-256-bits-long-replace-in-production}
    expiration-ms: 3600000
    refresh-expiration-ms: 604800000

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: true

server:
  port: 8080

logging:
  level:
    com.evyoog: INFO
    org.flywaydb: INFO
